name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Extract variant list dynamically from build_config.yaml
      # ---------------------------------------------------------
      - name: Extract variant list
        id: variants
        run: |
          VARIANTS=$(yq -r '.variants[].name' build_config.yaml | jq -R . | jq -s .)
          echo "matrix=$VARIANTS" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Convert extracted variants into a GitHub Actions matrix
      # ---------------------------------------------------------
      - name: Set matrix
        id: set-matrix
        uses: actions/github-script@v7
        with:
          script: |
            return {
              matrix: {
                variant: ${{ steps.variants.outputs.matrix }}
              }
            }

      # ---------------------------------------------------------
      # Login to GHCR
      # ---------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------------
      # Build variant and extract image list from build.sh output
      # ---------------------------------------------------------
      - name: Build variant and extract image list
        id: build
        run: |
          OUTPUT=$(./build.sh ${{ matrix.variant }})
          echo "$OUTPUT"

          IMAGES=$(echo "$OUTPUT" | sed -n '/IMAGE_LIST_BEGIN/,/IMAGE_LIST_END/p' | sed '1d;$d')
          JSON=$(printf '%s\n' "$IMAGES" | jq -R . | jq -s .)

          echo "images=$JSON" >> $GITHUB_OUTPUT

        strategy:
          matrix: ${{ fromJson(steps.set-matrix.outputs.result).matrix }}

      # ---------------------------------------------------------
      # Push all built images to GHCR
      # ---------------------------------------------------------
      - name: Push images to GHCR
        run: |
          echo '${{ steps.build.outputs.images }}' | jq -r '.[]' | while read IMG; do
            echo "Pushing $IMG"
            docker push "ghcr.io/${{ github.repository }}/$IMG"
          done
