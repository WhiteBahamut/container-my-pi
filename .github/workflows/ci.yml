name: CI/CD Pipeline

# ------------------------------------------------------------
# TRIGGERS
# ------------------------------------------------------------
# Run CI on:
#   - pushes to main or develop
#   - pull requests targeting main
# Ensures all variants are validated before merge.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ------------------------------------------------------------
# PERMISSIONS
# ------------------------------------------------------------
# packages: write → required to push images to GHCR
# contents: read → required for checkout
permissions:
  contents: read
  packages: write

# ------------------------------------------------------------
# CONCURRENCY CONTROL
# ------------------------------------------------------------
# Ensures only one workflow per branch runs at a time.
# If a new push arrives, the previous run is cancelled.
concurrency:
  group: ci-cd-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # JOB 1 — PREPARE MATRIX
  # ============================================================
  # Reads build_config.yaml and extracts the list of variants.
  # Produces a compact JSON array used as the matrix for builds.
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Install jq + yq for YAML/JSON processing
      - name: Install yq and jq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq
          pip3 install yq

      # --------------------------------------------------------
      # Extract variant list from build_config.yaml
      # Output MUST be compact JSON for GitHub Actions
      # --------------------------------------------------------
      - name: Extract variant list
        id: set-matrix
        run: |
          set -euo pipefail

          # Extract variant names as compact JSON array
          VARIANTS=$(yq -r '.variants[].name' build_config.yaml \
            | jq -R . \
            | jq -s -c .)

          # Validate non-empty
          if [ "$(printf '%s' "$VARIANTS" | jq length)" -eq 0 ]; then
            echo "No variants found in build_config.yaml" >&2
            exit 1
          fi

          # Emit compact JSON array to GitHub output
          echo "matrix=$VARIANTS" >> "$GITHUB_OUTPUT"

  # ============================================================
  # JOB 2 — BUILD AND PUSH IMAGES
  # ============================================================
  # Builds each variant in parallel using the matrix produced
  # by the prepare job. The authoritative build.sh script is
  # executed, and its IMAGE_LIST_BEGIN/END block is parsed to
  # determine which images must be pushed.
  build-and-push:
    name: Build and push images
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 4   # Avoids overloading the runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install jq + yq again (each job runs in a fresh VM)
      - name: Install jq and yq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq
          pip3 install yq

      # Latest QEMU action (v4)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Latest Buildx action (v4)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Latest login-action (v4)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # Run build.sh for the current variant.
      # build.sh MUST emit IMAGE_LIST_BEGIN/END markers.
      # --------------------------------------------------------
      - name: Run build.sh and capture image list
        id: build
        run: |
          set -euo pipefail

          echo "Running build.sh for variant: ${{ matrix.variant }}"

          # Run authoritative build script
          OUTPUT=$(./build.sh "${{ matrix.variant }}" "ghcr.io/whitebahamut" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }

          echo "$OUTPUT"

          # Extract lines between IMAGE_LIST_BEGIN and IMAGE_LIST_END
          IMAGES=$(printf '%s\n' "$OUTPUT" \
            | sed -n '/IMAGE_LIST_BEGIN/,/IMAGE_LIST_END/p' \
            | sed '1d;$d' || true)

          # Fail if no images were emitted
          if [ -z "$(printf '%s' "$IMAGES" | tr -d '[:space:]')" ]; then
            echo "No images emitted by build.sh for variant ${{ matrix.variant }}" >&2
            exit 1
          fi

          # Convert to compact JSON array for step output
          JSON=$(printf '%s\n' "$IMAGES" | jq -R . | jq -s -c .)
          echo "images=$JSON" >> "$GITHUB_OUTPUT"

      # --------------------------------------------------------
      # Push all built images to GHCR
      # --------------------------------------------------------
      - name: Push images to GHCR
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "${{ steps.build.outputs.images }}" \
            | jq -r '.[]' \
            | while read -r IMG; do

              # Fully qualified image (contains registry)
              if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
                echo "Pushing fully qualified image: $IMG"
                docker push "$IMG"
              else
                # Tag under GHCR if not fully qualified
                TARGET="ghcr.io/${GITHUB_REPOSITORY}/${IMG}"
                echo "Tagging $IMG -> $TARGET"
                docker tag "$IMG" "$TARGET"
                docker push "$TARGET"
              fi
            done

      # --------------------------------------------------------
      # OPTIONAL: Verify manifests exist for pushed images
      # --------------------------------------------------------
      - name: Verify manifests (non-blocking)
        if: always()
        run: |
          set -euo pipefail

          echo "${{ steps.build.outputs.images }}" \
            | jq -r '.[]' \
            | while read -r IMG; do

              if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
                TARGET="$IMG"
              else
                TARGET="ghcr.io/${{ github.repository }}/$IMG"
              fi

              echo "Inspecting manifest for $TARGET"

              if docker manifest inspect "$TARGET" > /dev/null 2>&1; then
                echo "Manifest exists for $TARGET"
              else
                echo "Warning: manifest not found for $TARGET" >&2
              fi
            done
