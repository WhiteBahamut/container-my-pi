name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mikefarah yq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          YQ_VERSION=v4.45.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Extract variant list
        id: set-matrix
        run: |
          set -euo pipefail

          # Produce a compact JSON array of variant names using yq only
          VARIANTS=$(yq eval -o=json -I=0 '[.variants[].name]' build_config.yaml)

          # Validate non-empty
          if [ "$(printf '%s' "$VARIANTS" | yq eval 'length' -)" -eq 0 ]; then
            echo "No variants found in build_config.yaml" >&2
            exit 1
          fi

          # Emit compact JSON array to GitHub Actions output
          echo "matrix=$VARIANTS" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push images
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mikefarah yq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          YQ_VERSION=v4.45.1
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build.sh and capture image list
        id: build
        run: |
          set -euo pipefail

          echo "Running build.sh for variant: ${{ matrix.variant }}"

          # Run authoritative build script and capture stdout/stderr
          OUTPUT=$(./build.sh "${{ matrix.variant }}" "ghcr.io/whitebahamut/oh-my-pi" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }

          echo "$OUTPUT"

          # Extract lines between IMAGE_LIST_BEGIN and IMAGE_LIST_END
          IMAGES=$(printf '%s\n' "$OUTPUT" \
            | sed -n '/IMAGE_LIST_BEGIN/,/IMAGE_LIST_END/p' \
            | sed '1d;$d' || true)

          # Fail if no images were emitted (trim whitespace)
          if [ -z "$(printf '%s' "$IMAGES" | tr -d '[:space:]')" ]; then
            echo "No images emitted by build.sh for variant ${{ matrix.variant }}" >&2
            exit 1
          fi

          # Convert newline-separated list to compact JSON array using yq only
          JSON=$(printf '%s\n' "$IMAGES" | yq eval -o=json -I=0 'split("\n") | map(select(. != ""))' -)

          echo "images=$JSON" >> "$GITHUB_OUTPUT"

      - name: Push images to GHCR
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Iterate over the JSON array using yq only
          printf '%s' "${{ steps.build.outputs.images }}" \
            | yq eval '.[]' - \
            | while read -r IMG; do

              # Trim possible surrounding quotes (yq prints scalars cleanly in most cases)
              IMG=$(printf '%s' "$IMG" | sed -E 's/^"(.*)"$/\1/')

              if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
                echo "Pushing fully qualified image: $IMG"
                docker push "$IMG"
              else
                TARGET="ghcr.io/${GITHUB_REPOSITORY}/${IMG}"
                echo "Tagging $IMG -> $TARGET"
                docker tag "$IMG" "$TARGET"
                docker push "$TARGET"
              fi
            done

      - name: Verify manifests (non-blocking)
        if: always()
        run: |
          set -euo pipefail

          printf '%s' "${{ steps.build.outputs.images }}" \
            | yq eval '.[]' - \
            | while read -r IMG; do

              IMG=$(printf '%s' "$IMG" | sed -E 's/^"(.*)"$/\1/')

              if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
                TARGET="$IMG"
              else
                TARGET="ghcr.io/${{ github.repository }}/$IMG"
              fi

              echo "Inspecting manifest for $TARGET"

              if docker manifest inspect "$TARGET" > /dev/null 2>&1; then
                echo "Manifest exists for $TARGET"
              else
                echo "Warning: manifest not found for $TARGET" >&2
              fi
            done
