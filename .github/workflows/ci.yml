name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq and jq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq
          pip3 install yq

      # --------------------------------------------------------
      # FIXED: Extract variant list (compact JSON, valid output)
      # --------------------------------------------------------
      - name: Extract variant list
        id: set-matrix
        run: |
          set -euo pipefail

          # Extract variant names as a compact JSON array
          VARIANTS=$(yq -r '.variants[].name' build_config.yaml | jq -R . | jq -s -c .)

          # Validate non-empty
          if [ "$(printf '%s' "$VARIANTS" | jq length)" -eq 0 ]; then
            echo "No variants found in build_config.yaml" >&2
            exit 1
          fi

          # Emit compact JSON array to GitHub output
          echo "matrix=$VARIANTS" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push images
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install jq and yq
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq
          pip3 install yq

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build.sh and capture image list
        id: build
        run: |
          set -euo pipefail
          echo "Running build.sh for variant: ${{ matrix.variant }}"
          OUTPUT=$(./build.sh "${{ matrix.variant }}" "ghcr.io/whitebahamut" 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"

          IMAGES=$(printf '%s\n' "$OUTPUT" | sed -n '/IMAGE_LIST_BEGIN/,/IMAGE_LIST_END/p' | sed '1d;$d' || true)

          if [ -z "$(printf '%s' "$IMAGES" | tr -d '[:space:]')" ]; then
            echo "No images emitted by build.sh for variant ${{ matrix.variant }}" >&2
            exit 1
          fi

          JSON=$(printf '%s\n' "$IMAGES" | jq -R . | jq -s .)
          echo "images=$JSON" >> $GITHUB_OUTPUT

      - name: Push images to GHCR
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "${{ steps.build.outputs.images }}" | jq -r '.[]' | while read -r IMG; do
            if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
              echo "Pushing fully qualified image: $IMG"
              docker push "$IMG"
            else
              TARGET="ghcr.io/${GITHUB_REPOSITORY}/${IMG}"
              echo "Tagging $IMG -> $TARGET"
              docker tag "$IMG" "$TARGET"
              echo "Pushing $TARGET"
              docker push "$TARGET"
            fi
          done

      - name:
        if: always()
        run: |
          set -euo pipefail
          echo "${{ steps.build.outputs.images }}" | jq -r '.[]' | while read -r IMG; do
            if printf '%s' "$IMG" | grep -qE '^[^/]+[.:][^/]+/'; then
              TARGET="$IMG"
            else
              TARGET="ghcr.io/${{ github.repository }}/$IMG"
            fi
            echo "Inspecting manifest for $TARGET"
            if docker manifest inspect "$TARGET" > /dev/null 2>&1; then
              echo "Manifest exists for $TARGET"
            else
              echo "Warning: manifest not found for $TARGET" >&2
            fi
          done
