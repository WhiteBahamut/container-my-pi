variants:
  - name: standard
    tag: standard
    command: "RUN dnf install -y bash curl jq yq openssl git tar && dnf clean all "
  - name: kubectl-tools
    tag: kubectl
    command: |
      RUN dnf install -y bash curl jq yq openssl git tar && dnf clean all && \
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" &&  \
        chmod +x kubectl &&  \
        mkdir -p /usr/local/bin &&  \
        mv ./kubectl /usr/local/bin/kubectl
  - name: dotnet-dev
    tag: dotnet
    command: "RUN dnf install -y bash curl jq yq openssl git tar dotnet-sdk-10 && dnf clean all"
